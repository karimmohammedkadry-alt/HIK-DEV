<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Mohamed</title>

<link rel="stylesheet" href="style5.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;
}

body{
background:#080808;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:#fff;
}

.container{
width:360px;
text-align:center;
padding:20px;
}

.logo-circle{
width:150px;
height:150px;
margin:auto;
border-radius:50%;
background:linear-gradient(145deg,#1b1b1b,#090909);
display:flex;
justify-content:center;
align-items:center;
border:1px solid #333;
box-shadow:0 20px 40px rgba(0,0,0,.5);
}

.logo{
font-size:70px;
font-weight:900;
}

h1{
margin-top:25px;
font-size:34px;
letter-spacing:6px;
}

.job{
margin:10px 0 35px;
color:#888;
letter-spacing:4px;
font-size:14px;
}

.buttons{
display:flex;
justify-content:space-between;
gap:15px;
}

.box{
flex:1;
height:105px;
background:#161616;
border-radius:22px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-decoration:none;
color:white;
border:1px solid #2f2f2f;
cursor:pointer;
transition:.3s;
}

.box:hover{
transform:translateY(-6px);
background:#222;
}

.box i{
font-size:34px;
margin-bottom:10px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
backdrop-filter:blur(6px);
display:none;
justify-content:center;
align-items:flex-end;
}

.sheet{
width:100%;
max-width:420px;
background:#181818;
padding:25px;
border-radius:30px 30px 0 0;
animation:up .3s ease;
}

@keyframes up{
from{
transform:translateY(120px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

.handle{
width:60px;
height:6px;
background:#666;
margin:auto;
border-radius:20px;
margin-bottom:20px;
}

.sheet h2{
text-align:center;
margin-bottom:10px;
}

.sheet p{
text-align:center;
color:#888;
margin-bottom:20px;
}

.number{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
margin-bottom:15px;
background:#232323;
border-radius:18px;
color:white;
text-decoration:none;
}

.left{
display:flex;
align-items:center;
gap:15px;
}

.left i{
font-size:35px;
color:#25D366;
}

button{
width:100%;
padding:18px;
background:#252525;
border:none;
border-radius:18px;
color:white;
font-size:17px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="logo-circle">
<div class="logo">M</div>
</div>

<h1>MOHAMED</h1>

<p class="job">WEB DEVELOPER</p>

<div class="buttons">

<div class="box" onclick="openModal()">
<i class="fab fa-whatsapp"></i>
<span>WhatsApp</span>
</div>

<a class="box" href="https://instagram.com/yourusername">
<i class="fab fa-instagram"></i>
<span>Instagram</span>
</a>

<a class="box" href="tel:01066517988">
<i class="fa-solid fa-phone"></i>
<span>Call</span>
</a>

</div>

</div>

<div class="modal" id="modal">

<div class="sheet">

<div class="handle"></div>

<h2>Choose WhatsApp</h2>

<p>Select one of your numbers</p>

<a class="number" href="https://wa.me/201066517988">

<div class="left">
<i class="fab fa-whatsapp"></i>

<div>
<b>Business 1</b><br>
<small>01066517988</small>
</div>

</div>

<i class="fa-solid fa-chevron-right"></i>

</a>

<a class="number" href="https://wa.me/201125093884">

<div class="left">
<i class="fab fa-whatsapp"></i>

<div>
<b>Business 2</b><br>
<small>01125093884</small>
</div>

</div>

<i class="fa-solid fa-chevron-right"></i>

</a>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

<script>

const modal=document.getElementById("modal");

function openModal(){
modal.style.display="flex";
}

function closeModal(){
modal.style.display="none";
}

modal.onclick=function(e){
if(e.target===modal){
closeModal();
}
}

</script>

</body>
</html>
